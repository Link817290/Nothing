name: Desktop Build

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: build:win
          - os: ubuntu-22.04
            cmd: build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        working-directory: packages/desktop
        run: npm install

      - name: Build
        working-directory: packages/desktop
        run: npm run ${{ matrix.cmd }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Nothing Desktop ${{ github.ref_name }}'
          body: 'Desktop app for Nothing Mail'
          files: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.dmg
