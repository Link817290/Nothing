services:
  # ─── Caddy (reverse proxy + auto HTTPS) ────────────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - web
      - server
    restart: unless-stopped

  # ─── Web (frontend) ────────────────────────────────────────
  web:
    build: ../packages/web
    expose:
      - "80"
    depends_on:
      - server
    restart: unless-stopped

  # ─── Server (API) ──────────────────────────────────────────
  server:
    build: ../packages/server
    expose:
      - "3000"
    volumes:
      - attachments:/data/attachments
    environment:
      - DATABASE_URL=postgres://nothing:${DB_PASSWORD:-nothing}@db:5432/nothing
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPT_KEY=${ENCRYPT_KEY:-change-me-in-production}
      - MAIL_ADMIN_URL=http://mail:8080
      - MAIL_ADMIN_USER=${MAIL_ADMIN_USER:-admin}
      - MAIL_ADMIN_PASS=${MAIL_ADMIN_PASS:-changeme}
      - SERVER_IP=${SERVER_IP:-}
      - ATTACHMENT_DIR=/data/attachments
      - MAIL_DOMAIN=${MAIL_DOMAIN:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=nothing
      - POSTGRES_PASSWORD=${DB_PASSWORD:-nothing}
      - POSTGRES_DB=nothing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nothing"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Stalwart (mail server, optional) ──────────────────────
  mail:
    image: stalwartlabs/stalwart:latest
    user: "0"
    entrypoint: ["stalwart", "-c", "/opt/stalwart-mail/etc/config.json"]
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
    expose:
      - "8080"
    volumes:
      - maildata:/opt/stalwart-mail
      - ./stalwart/config.json:/opt/stalwart-mail/etc/config.json:ro
    environment:
      - STALWART_RECOVERY_ADMIN=${MAIL_ADMIN_USER:-admin}:${MAIL_ADMIN_PASS:-changeme}
    restart: unless-stopped

volumes:
  pgdata:
  maildata:
  attachments:
  caddy_data:
  caddy_config:
